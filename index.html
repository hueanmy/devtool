  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="DevToolKit — Local-First Developer Tools">
  <meta name="twitter:description" content="JSON, SQL, Markdown, TypeScript types, List Cleaner, Binary Metadata & SQL Query Plan — all running 100% in your browser. No server. No tracking.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap');
    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --accent: #3b82f6;
    }
    .dark {
      --bg-primary: #0a1120;
      --bg-secondary: #131c2e;
      --accent: #60a5fa;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-primary);
      color: #1e293b;
      margin: 0;
      overflow-x: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    .dark body { color: #e2e8f0; }
    .mono { font-family: 'Fira Code', monospace; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .dark ::-webkit-scrollbar-thumb { background: #1e2d45; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #2a3f5f; }

    @media print {
      .no-print { display: none !important; }
      body { background: white !important; color: black !important; }
    }

    .glass {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(203, 213, 225, 0.5);
    }
    .dark .glass {
      background: rgba(19, 28, 46, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(30, 45, 69, 0.6);
    }
  </style>
  <script>
    /* Apply dark class before paint to prevent flash */
    (function(){
      if (localStorage.getItem('devtoolkit:theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root">
    <div style="display: flex; height: 100vh; flex-direction: column; align-items: center; justify-content: center; color: #475569; text-align: center; padding: 20px;">
      <i id="loading-icon" class="fa-solid fa-code fa-spin-pulse" style="font-size: 2.5rem; color: #3b82f6; margin-bottom: 1.5rem;"></i>
      <div id="status-text" style="font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; font-size: 0.75rem;">Loading DevToolKit...</div>
      <div id="error-display" style="display: none; margin-top: 20px; color: #ef4444; max-width: 500px;">
        <p style="font-size: 0.8rem; font-family: monospace; background: rgba(239, 68, 68, 0.1); padding: 15px; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2);" id="error-text"></p>
        <button onclick="location.reload()" style="margin-top: 15px; background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.75rem;">RETRY INITIALIZATION</button>
      </div>
    </div>
  </div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
